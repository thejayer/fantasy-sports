name: deploy dashboard

# Manual deploy of the Streamlit dashboard to Google Cloud Run.
#
# One-time setup (see DEPLOY.md):
#   - a GCP project with billing enabled
#   - a service account with roles: run.admin, iam.serviceAccountUser,
#     artifactregistry.admin, serviceusage.serviceUsageAdmin
#   - repo secrets:  GCP_SA_KEY  (the service-account JSON key)
#                    DASHBOARD_PASSWORD  (shared league password)
#
# Then run this workflow from the Actions tab, filling in the project id.

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "GCP project ID"
        required: true
      region:
        description: "Cloud Run region"
        required: true
        default: "us-central1"
      service:
        description: "Cloud Run service name"
        required: true
        default: "ffa-dashboard"
      ingest_seasons:
        description: "Seasons to bake into the image (space-separated)"
        required: true
        default: "2023 2024 2025"
      dashboard_season:
        description: "Season the dashboard projects"
        required: true
        default: "2026"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable \
            run.googleapis.com artifactregistry.googleapis.com \
            --project "${{ inputs.project_id }}"

      - name: Ensure Artifact Registry repo
        run: |
          gcloud artifacts repositories describe ffa \
            --location "${{ inputs.region }}" --project "${{ inputs.project_id }}" 2>/dev/null \
          || gcloud artifacts repositories create ffa \
            --repository-format=docker --location "${{ inputs.region }}" \
            --project "${{ inputs.project_id }}" --description "ffa dashboard images"

      - name: Build and push image
        run: |
          IMAGE="${{ inputs.region }}-docker.pkg.dev/${{ inputs.project_id }}/ffa/dashboard:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud auth configure-docker "${{ inputs.region }}-docker.pkg.dev" --quiet
          docker build --build-arg INGEST_SEASONS="${{ inputs.ingest_seasons }}" -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ inputs.service }}" \
            --project "${{ inputs.project_id }}" \
            --region "${{ inputs.region }}" \
            --image "$IMAGE" \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi --cpu 1 --port 8080 \
            --set-env-vars "DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }},DASHBOARD_SEASON=${{ inputs.dashboard_season }},DASHBOARD_LEAGUE=ppr"

      - name: Print the live URL
        run: |
          echo "Deployed to:"
          gcloud run services describe "${{ inputs.service }}" \
            --project "${{ inputs.project_id }}" --region "${{ inputs.region }}" \
            --format 'value(status.url)'
